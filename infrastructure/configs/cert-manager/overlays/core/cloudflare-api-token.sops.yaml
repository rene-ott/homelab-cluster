# Cloudflare API token for cert-manager DNS-01 challenges.
# Token must be scoped to: Zone:DNS:Edit + Zone:Zone:Read for your domain.
# Create at: My Profile → API Tokens → Create Custom Token
#
# RULE: Fill the token locally, encrypt immediately, commit only the encrypted output.
#       Never commit a plaintext token.
#
#   1. Set api-token below to your actual Cloudflare token.
#   2. Encrypt in place (requires .sops.yaml at the repo root to have a real age1... recipient):
#        ./scripts/sops-encryption.sh   # select "Encrypt" and pick this file
#   3. Commit only the encrypted output — api-token will be SOPS ciphertext, not plaintext.
#
# Until a real token is filled, encrypted, and committed, cert-manager DNS-01 will fail — expected.
apiVersion: v1
kind: Secret
metadata:
    name: cloudflare-api-token
    namespace: cert-manager
type: Opaque
stringData:
    api-token: ENC[AES256_GCM,data:qcHSTxmGnUJzK4V4jCFzY8iYSbdt9ozBxbcQCV6na49rpnGRr9R0wRf8NVXmHxEiL/9VFWY=,iv:R/xcFIGbWYt6B6OeAwyO+xtFSq+J3YXw821G+4rHpLE=,tag:/tJooxqqw7fmTfN+E955MA==,type:str]
sops:
    age:
        - enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
