# Cluster-wide substitution variables (domain, ACME email) consumed via
# postBuild.substituteFrom by the Flux Kustomizations in clusters/core-stg/.
#
# Kept as a SOPS-encrypted Secret (not a plaintext ConfigMap) so the real domain
# and email aren't exposed if this repo is public.
#
# domain_apps MUST differ from the core (prod) cluster so the two clusters don't
# request the same wildcard cert or write conflicting DNS-01 records.
#
# RULE: Fill the values below, encrypt immediately, commit only the encrypted output.
#       Never commit plaintext.
#
#   ./scripts/sops.sh   # select "Encrypt" and pick this file
#
