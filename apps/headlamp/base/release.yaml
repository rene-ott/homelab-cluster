---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: "0.43.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
  values:
    config:
      watchPlugins: true
      # Skip the login screen — authenticate every visitor as the pod's
      # read-only `view` ServiceAccount. Safe for this internal-only homelab
      # (Headlamp is reachable only on the private LAN via the wildcard cert).
      # Wired in chart 0.43.0 (config.inCluster defaults to true).
      unsafeUseServiceAccountToken: true

    serviceAccount:
      create: true
      name: headlamp
    clusterRoleBinding:
      create: true
      clusterRoleName: view

    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.6.0
        installOptions:
          parallel: true
          maxConcurrent: 2

    ingress:
      enabled: false
