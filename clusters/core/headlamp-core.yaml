---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: headlamp-core
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./apps/headlamp/overlays/core
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cert-manager-configs
    - name: cluster-vars
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
