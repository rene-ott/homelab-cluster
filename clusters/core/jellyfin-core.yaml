---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin-core
  namespace: flux-system
spec:
  interval: 10m0s
  retryInterval: 1m0s
  path: ./apps/jellyfin/overlays/core
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cert-manager-configs
    - name: cluster-vars-secret
    - name: cluster-vars-public
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars-secret
      - kind: ConfigMap
        name: cluster-vars-public
