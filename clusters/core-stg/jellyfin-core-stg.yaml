---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin-core-stg
  namespace: flux-system
spec:
  interval: 10m0s
  retryInterval: 1m0s
  path: ./apps/jellyfin/overlays/shared
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cert-manager-configs-core-stg
    - name: cluster-vars-secret-core-stg
    - name: cluster-vars-public-core-stg
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars-secret
      - kind: ConfigMap
        name: cluster-vars-public
