---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-vars-secret-core-stg
  namespace: flux-system
spec:
  interval: 10m0s
  retryInterval: 1m0s
  path: ./infrastructure/configs/cluster-vars-secret/core-stg
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
