---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-configs-core-stg
  namespace: flux-system
spec:
  interval: 10m0s
  retryInterval: 1m0s
  path: ./infrastructure/configs/cert-manager/overlays/shared
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cert-manager-controllers-core-stg
    - name: cluster-vars-secret-core-stg
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars-secret
